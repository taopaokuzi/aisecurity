route = []
requires_manager_approval = false
requires_escalated_approval = false
recommended_path = "direct_process"
reason = "普通同部门只读请求可直接进入后续流程。"

[[routes]]
name = "manager_review"
risk_levels = ["Medium"]
approval_required = true
route = ["manager"]
requires_manager_approval = true
requires_escalated_approval = false
recommended_path = "manager_approval"
reason = "中风险请求需要主管审批。"

[[routes]]
name = "security_escalation"
risk_levels = ["High", "Critical"]
approval_required = true
route = ["manager", "security_admin"]
requires_manager_approval = true
requires_escalated_approval = true
